services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: module3_app_prod
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-compliance_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-nabilah}
      GROQ_API_KEY: ${GROQ_API_KEY}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kuala_Lumpur}
      FLASK_ENV: production
      FLASK_DEBUG: "0"
    ports:
      - "${APP_PORT:-5050}:5000"
    volumes:
      - ./evidence:/app/evidence
    command: gunicorn --workers 2 --threads 4 --timeout 180 --bind 0.0.0.0:5000 app:app
    restart: unless-stopped
